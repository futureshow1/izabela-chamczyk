    <main>
      <h1 class="page-title">Kontakt</h1>

      <div class="contact-form">
        <h2>Contact</h2>
        <form id="contact-form" action="https://formspree.io/f/izabela.chamczyk@gmail.com" method="POST">
          <input type="text" name="_gotcha" style="display:none">
          <div class="form-group">
            <label for="message">Wiadomość <span class="required">*</span></label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <div class="form-group">
            <label for="email">Adres email <span class="required">*</span></label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="phone">Telefon</label>
            <input type="tel" id="phone" name="phone">
          </div>
          <button type="submit">Wyślij</button>
        </form>
        <div id="form-success" style="display:none">
          <p style="font-size:18px; color:#333; font-style:italic; padding:30px 0;">Dziękuję! Wiadomość została wysłana.</p>
        </div>
      </div>
    </main>
